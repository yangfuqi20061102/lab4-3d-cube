<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Cube</title>
    <style>
        .scene {
            width: 200px;
            height: 200px;
            margin: 100px auto;
            perspective: 1000px; /* 3D 透视效果 */
        }

        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d; /* 保留 3D 空间 */
            transform: rotateX(30deg) rotateY(45deg); /* 初始角度，方便看 3D 效果 */
        }

        .cube__face {
            position: absolute;
            width: 200px;
            height: 200px;
            opacity: 0.8;
        }

        /* 前面 */
        .cube__face--front {
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            transform: translateZ(100px);
        }

        /* 右面 */
        .cube__face--right {
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
            transform: translateX(100px) rotateY(90deg);
        }

        /* 后面 */
        .cube__face--back {
            background: linear-gradient(225deg, #667eea, #764ba2);
            transform: translateZ(-100px) rotateY(180deg);
        }

        /* 左面 */
        .cube__face--left {
            background: linear-gradient(315deg, #f093fb, #f5576c);
            transform: translateX(-100px) rotateY(-90deg);
        }

        /* 上面 */
        .cube__face--top {
            background: linear-gradient(0deg, #4facfe, #00f2fe);
            transform: translateY(-100px) rotateX(90deg);
        }

        /* 下面 */
        .cube__face--bottom {
            background: linear-gradient(180deg, #43e97b, #38f9d7);
            transform: translateY(100px) rotateX(-90deg);
        }

        /* 可选：加上 skew 效果，更贴合题目要求 */
        .cube__face--front {
            transform: translateZ(100px) skewX(10deg) skewY(5deg);
        }
        .cube__face--right {
            transform: translateX(100px) rotateY(90deg) skewX(-5deg) skewY(10deg);
        }
    </style>
</head>
<body>
    <div class="scene">
        <div class="cube">
            <div class="cube__face cube__face--front"></div>
            <div class="cube__face cube__face--back"></div>
            <div class="cube__face cube__face--right"></div>
            <div class="cube__face cube__face--left"></div>
            <div class="cube__face cube__face--top"></div>
            <div class="cube__face cube__face--bottom"></div>
        </div>
    </div>
</body>
</html>
