<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Cube</title>
    <style>
        .scene {
            width: 200px;
            height: 200px;
            margin: 100px auto;
            perspective: 1000px;
        }
        .cube {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(30deg) rotateY(45deg);
            animation: rotate 10s infinite linear;
        }
        @keyframes rotate {
            0% { transform: rotateX(30deg) rotateY(45deg); }
            100% { transform: rotateX(30deg) rotateY(405deg); }
        }
        .cube__face {
            position: absolute;
            width: 200px;
            height: 200px;
            opacity: 0.8;
        }
        .cube__face--front  { background: #ff9a9e; transform: translateZ(100px); }
        .cube__face--right  { background: #a18cd1; transform: translateX(100px) rotateY(90deg); }
        .cube__face--back   { background: #667eea; transform: translateZ(-100px) rotateY(180deg); }
        .cube__face--left   { background: #f093fb; transform: translateX(-100px) rotateY(-90deg); }
        .cube__face--top    { background: #4facfe; transform: translateY(-100px) rotateX(90deg); }
        .cube__face--bottom { background: #43e97b; transform: translateY(100px) rotateX(-90deg); }
    </style>
</head>
<body>
    <div class="scene">
        <div class="cube">
            <div class="cube__face cube__face--front"></div>
            <div class="cube__face cube__face--back"></div>
            <div class="cube__face cube__face--right"></div>
            <div class="cube__face cube__face--left"></div>
            <div class="cube__face cube__face--top"></div>
            <div class="cube__face cube__face--bottom"></div>
        </div>
    </div>
</body>
</html>
